<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://costnest.app/" />
  <title>Costnest | Vorlage</title>
  <meta name="description" content="Vorlage pruefen und in eine normale Sammlung umwandeln.">
  <script>
    (function () {
      var key = 'costnest.theme';
      var theme = 'light';

      try {
        var stored = localStorage.getItem(key);
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
      } catch (error) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
      }

      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="template-detail">
  <a class="skip-link" href="#content">Zum Inhalt springen</a>
  <div id="app-header"></div>

  <main id="content" class="page page-template-detail">
    <section class="card empty-state" id="template-not-found" hidden>
      <h1>Vorlage nicht gefunden</h1>
      <p>Bitte waehle eine Vorlage aus der Uebersicht.</p>
      <a class="button button-primary" href="templates.html">Zurueck</a>
    </section>

    <section id="template-detail-content" hidden>
      <nav class="template-detail-nav" aria-label="Vorlagen Navigation">
        <a class="template-back-link" href="templates.html">
          <span class="template-back-link__icon" aria-hidden="true">&#8249;</span>
          <span>Zurueck zu den Vorlagen</span>
        </a>
      </nav>

      <section class="card template-detail-head">
        <div class="template-detail-head__content">
          <h1 id="template-title">Vorlage</h1>
          <div class="template-detail-copy" aria-label="Vorlagenbeschreibung">
            <p id="template-intro-copy">Nutze diese Vorlage als schnellen Einstieg in deine Planung.</p>
            <p id="template-purpose-copy">Du kannst Vorschlaege auswaehlen und direkt in eine Sammlung uebernehmen.</p>
          </div>
        </div>
      </section>

      <section class="template-suggestions-list" id="template-suggestions-list" aria-label="Vorschlaege"></section>

      <section class="card template-related" id="template-related" hidden>
        <h2>Aehnliche Vorlagen</h2>
        <nav id="template-related-links" aria-label="Aehnliche Vorlagen"></nav>
      </section>

      <section class="template-detail-footer-action template-floating-cta">
        <button type="button" class="button button-primary" id="convert-template-bottom">In Sammlung umwandeln</button>
      </section>
    </section>
  </main>
  <div id="app-footer"></div>

  <script src="../assets/js/core/namespace.js" defer></script>
  <script src="../assets/js/utils/currency.js" defer></script>
  <script src="../assets/js/utils/url.js" defer></script>
  <script src="../assets/js/utils/id.js" defer></script>
  <script src="../assets/js/storage/local-storage-service.js" defer></script>
  <script src="../assets/js/data/template-repository.js" defer></script>
  <script src="../assets/js/data/collection-repository.js" defer></script>
  <script src="../assets/js/data/item-repository.js" defer></script>
  <script src="../assets/js/domain/templates-domain.js" defer></script>
  <script src="../assets/js/components/template-suggestion-item.js" defer></script>
  <script src="../assets/js/components/template-related-link.js" defer></script>
  <script src="../assets/js/ui/header.js" defer></script>
  <script src="../assets/js/ui/footer.js" defer></script>
  <script src="../assets/js/ui/toast.js" defer></script>
  <script src="../assets/js/pages/template-detail-page.js" defer></script>
  <script src="../assets/js/core/bootstrap.js" defer></script>
</body>
</html>
