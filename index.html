<!doctype html>
<html lang="de">
<head>

  <meta name="description" content="Preise und Wunschpreise in Sammlungen klar vergleichen.">
  <link rel="stylesheet" href="assets/css/base.css">

<body data-page="home">

  <div id="app-header"></div>

        <h2>Alternativen</h2>
